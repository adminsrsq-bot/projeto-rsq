<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.S.Q — Sistema de Rastreabilidade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Instrument+Sans:wght@300;400;600&family=Instrument+Mono:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base:      #12141c;
            --bg-deep:      #0d0f18;
            --text-primary: #f4f6ff;
            --text-muted:   #7a87b0;
            --text-dim:     #3d4666;
            --blue:         #4da6ff;
            --border:       rgba(255,255,255,0.07);
            --border-focus: rgba(77,166,255,0.45);
            --ff-serif: 'Playfair Display', serif;
            --ff-sans:  'Instrument Sans', sans-serif;
            --ff-mono:  'Instrument Mono', monospace;
        }

        /* --- LOADING SCREEN --- */
        #loading-screen {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #loading-screen.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-logo { font-family: var(--ff-serif); font-size: 32px; letter-spacing: 8px; color: var(--text-primary); margin-bottom: 20px; }
        .loader-bar { height: 2px; width: 200px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .loader-fill { position: absolute; height: 100%; width: 50%; background: var(--blue); animation: scan 1.5s infinite linear; }
        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }

        /* --- LAYOUT --- */
        body { background: var(--bg-deep); color: var(--text-primary); font-family: var(--ff-sans); min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(77,166,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(77,166,255,0.03) 1px, transparent 1px); background-size: 40px 40px; mask-image: radial-gradient(circle, black, transparent 80%); z-index: -1; }

        .auth-container { background: rgba(18, 20, 28, 0.8); border: 1px solid var(--border); width: 100%; max-width: 400px; padding: 40px; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        .logo-area { font-family: var(--ff-serif); font-size: 24px; letter-spacing: 4px; margin-bottom: 40px; text-align: center; }
        
        .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .auth-tab { flex: 1; background: none; border: none; padding: 10px; color: var(--text-muted); cursor: pointer; font-family: var(--ff-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .auth-tab.active { color: var(--blue); border-bottom: 2px solid var(--blue); }

        .field-group { margin-bottom: 20px; }
        .field-label { display: block; font-family: var(--ff-mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .field-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: white; padding: 12px; outline: none; box-sizing: border-box; }
        .field-input:focus { border-color: var(--blue); }

        .btn-submit { width: 100%; padding: 14px; background: var(--blue); color: #000; border: none; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-submit:hover { opacity: 0.9; box-shadow: 0 0 15px var(--blue); }
        .btn-submit.loading { opacity: 0.5; pointer-events: none; }

        .form-message { font-size: 12px; padding: 10px; margin-bottom: 20px; display: none; text-align: center; }
        .form-message.error { background: rgba(255,0,0,0.1); color: #ff6b6b; border: 1px solid #ff6b6b; display: block; }
        .form-message.success { background: rgba(0,255,0,0.1); color: #51cf66; border: 1px solid #51cf66; display: block; }

        .auth-form { display: none; }
        .auth-form.active { display: block; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-logo">R.S.Q</div>
        <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>

    <div class="bg-grid"></div>

    <main class="auth-container">
        <div class="logo-area">R.S.Q SYSTEM</div>

        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Acessar</button>
            <button class="auth-tab" data-tab="register" onclick="switchTab('register')">Novo Registro</button>
        </div>

        <div id="formMessage" class="form-message"></div>

        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="field-group">
                <label class="field-label">E-mail</label>
                <input type="email" id="loginEmail" class="field-input" placeholder="seu@email.com" required>
            </div>
            <div class="field-group">
                <label class="field-label">Senha</label>
                <input type="password" id="loginPassword" class="field-input" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn" class="btn-submit">Entrar no Sistema</button>
        </form>

        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
            <div class="field-group">
                <label class="field-label">E-mail Corporativo</label>
                <input type="email" id="regEmail" class="field-input" required>
            </div>
            <div class="field-group">
                <label class="field-label">Definir Senha</label>
                <input type="password" id="regPassword" class="field-input" placeholder="Mín. 6 caracteres" required>
            </div>
            <button type="submit" id="regBtn" class="btn-submit">Criar minha conta</button>
        </form>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURAÇÃO COM SUAS CHAVES REAIS
        const firebaseConfig = {
            apiKey: "AIzaSyCGPbG7dOxJkpM0vTJFps3ywS6_Kco6-SE",
            authDomain: "rsq-site-a3ee5.firebaseapp.com",
            projectId: "rsq-site-a3ee5",
            storageBucket: "rsq-site-a3ee5.firebasestorage.app",
            messagingSenderId: "735775288628",
            appId: "1:735775288628:web:4a5d38590c3a4a1a6e4961"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // FUNÇÃO DE LOGIN
        window.handleLogin = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('formMessage');
            btn.classList.add('loading');
            msg.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
                msg.textContent = "Acesso autorizado!";
                msg.className = "form-message success";
                msg.style.display = 'block';
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
            } catch (err) {
                msg.textContent = "E-mail ou senha incorretos.";
                msg.className = "form-message error";
                msg.style.display = 'block';
            } finally { btn.classList.remove('loading'); }
        };

        // FUNÇÃO DE CADASTRO + BANCO DE DADOS
        window.handleRegister = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const msg = document.getElementById('formMessage');
            btn.classList.add('loading');

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, regEmail.value, regPassword.value);
                const user = userCredential.user;

                // Salva o usuário no Firestore (Banco de Dados)
                await setDoc(doc(db, "usuarios", user.uid), {
                    email: user.email,
                    role: "operador",
                    joinedAt: new Date()
                });

                msg.textContent = "Conta criada com sucesso!";
                msg.className = "form-message success";
                msg.style.display = 'block';
                setTimeout(() => switchTab('login'), 2000);
            } catch (err) {
                msg.textContent = "Erro ao cadastrar: " + err.message;
                msg.className = "form-message error";
                msg.style.display = 'block';
            } finally { btn.classList.remove('loading'); }
        };
    </script>

    <script>
        // INTERFACE TRICKS
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('loading-screen').classList.add('fade-out'), 1500);
        });

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.toggle('active', f.id === tab + 'Form'));
            document.getElementById('formMessage').style.display = 'none';
        }
    </script>
</body>
</html>
